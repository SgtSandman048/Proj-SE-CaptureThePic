services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: photomarket-backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ../Frontend
      dockerfile: dockerfile
    container_name: photomarket-frontend
    ports:
      - "5174:5174"
    env_file:
      - ../Frontend/.env
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
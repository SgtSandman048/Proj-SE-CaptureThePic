services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: photomarket-backend
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      - CORS_ORIGIN=http://localhost:5174
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ../Frontend
      dockerfile: dockerfile
      args:
        - VITE_API_URL=http://backend:8080/api
    container_name: photomarket-frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge